name: Disconnected Readiness Summary

on:
  schedule:
    - cron: '17 * * * *'
  push:
    branches: [main]
    paths:
      - 'config/config.yaml'
      - '.github/config/repositories.yaml'
  workflow_dispatch:
    inputs:
      repo:
        description: "Single repo to score (e.g. odh-dashboard). Leave empty to score all."
        required: false
        type: string
        default: ""
      parallel:
        description: "Number of repos to score concurrently"
        required: false
        type: string
        default: "4"

jobs:
  summary:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml jinja2

      - name: Run batch scorer
        env:
          INPUT_REPO: ${{ inputs.repo }}
          INPUT_PARALLEL: ${{ inputs.parallel || '4' }}
        run: |
          set -euo pipefail
          args=(--parallel "$INPUT_PARALLEL" --timing)
          if [ -n "$INPUT_REPO" ]; then
            args+=(--repo "$INPUT_REPO")
          fi
          python3 run_all.py "${args[@]}" || true

      - name: Show summary
        if: always()
        run: |
          summary=$(find reports -name summary.md -type f 2>/dev/null | head -1)
          if [ -n "$summary" ]; then
            cat "$summary" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "⚠️ No summary.md generated" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: readiness-reports
          path: reports/
          retention-days: 30
