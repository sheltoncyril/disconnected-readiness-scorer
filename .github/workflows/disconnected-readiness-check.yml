name: Disconnected Readiness Check

# Reusable workflow for disconnected environment readiness checks.
# Can also be triggered manually via the Actions UI.

on:
  workflow_call:
    inputs:
      rules:
        description: "Rules to run (empty = all default rules, or e.g. csv,tags,egress)"
        required: false
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      rules:
        description: "Rules to run (empty = all default rules, or e.g. csv,tags,egress)"
        required: false
        type: string
        default: ""

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Checkout scorer
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: opendatahub-io/disconnected-readiness-scorer
          ref: d3092ce4c754a1436e5720f8f85665ee05745b15 # Pinned to specific commit for deterministic execution
          path: scorer

      - name: Run disconnected readiness check
        env:
          INPUT_RULES: ${{ inputs.rules }}
        run: |
          pip install pyyaml jinja2
          cd scorer

          # Build arguments array with rules if specified
          ARGS=("${{ github.workspace }}" --report json)
          if [ -n "$INPUT_RULES" ]; then
            ARGS+=(--rules "$INPUT_RULES")
          fi

          # Run analysis and capture JSON output
          python3 main.py "${ARGS[@]}" > disconnected-report.json

      - name: Store results as artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: disconnected-readiness-report
          path: scorer/disconnected-report.json
          retention-days: 7
