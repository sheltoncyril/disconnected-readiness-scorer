name: Disconnected Readiness Check

# Reusable workflow for disconnected environment readiness checks.
# Can also be triggered manually via the Actions UI.

on:
  workflow_call:
    inputs:
      rules:
        description: "Rules to run (empty = all default rules, or e.g. csv,tags,egress)"
        required: false
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      rules:
        description: "Rules to run (empty = all default rules, or e.g. csv,tags,egress)"
        required: false
        type: string
        default: ""

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Checkout scorer
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: opendatahub-io/disconnected-readiness-scorer
          ref: v1 # Floating major version for automatic patch/minor updates
          path: scorer

      - name: Install dependencies
        run: |
          cd scorer && uv sync --extra report --frozen && make install-arch-analyzer

      - name: Run disconnected readiness check
        env:
          INPUT_RULES: ${{ inputs.rules }}
        run: |
          cd scorer

          # Build arguments array with rules if specified
          ARGS=("${{ github.workspace }}" --report json,markdown -o disconnected-report.json disconnected-report.md)
          if [ -n "$INPUT_RULES" ]; then
            ARGS+=(--rules "$INPUT_RULES")
          fi

          # Run analysis and capture JSON output
          uv run main.py "${ARGS[@]}"

      - name: Show summary
        if: always()
        run: |
          if [ -f scorer/disconnected-report.md ]; then
            cat scorer/disconnected-report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "⚠️ No disconnected-report.md generated" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Store results as artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: disconnected-readiness-report
          path: |
            scorer/disconnected-report.json
            scorer/disconnected-report.md
          retention-days: 1
