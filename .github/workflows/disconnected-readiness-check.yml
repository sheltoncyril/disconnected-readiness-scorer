name: Disconnected Readiness Check

# This workflow is designed to run on Pull Requests only
# It analyzes the PR's code for disconnected environment readiness

on:
  workflow_call:
    inputs:
      rules:
        description: "Rules to run (empty = all default rules, or e.g. csv,tags,egress)"
        required: false
        type: string
        default: ""

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Checkout scorer
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: opendatahub-io/disconnected-readiness-scorer
          ref: main # TODO: pin to tag/SHA once release process is in place
          path: scorer

      - name: Run disconnected readiness check
        env:
          INPUT_RULES: ${{ inputs.rules }}
        run: |
          pip install pyyaml jinja2
          cd scorer

          if [ -n "$INPUT_RULES" ]; then
            python3 main.py "${{ github.workspace }}" --rules "$INPUT_RULES" --report json
          else
            python3 main.py "${{ github.workspace }}" --report json
          fi

      - name: Store results as artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: disconnected-readiness-report
          path: scorer/disconnected-report.json
          retention-days: 7
