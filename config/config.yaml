# yaml-language-server: $schema=../schemas/config.schema.json
#
# Central configuration for the disconnected readiness scanner.
# Applies to all scanned repos unless scoped by 'repo' field.

# Docker build context overrides for repos where COPY . . would otherwise
# resolve to repo root (making scope detection too broad).
# Format: dockerfile_path (relative to repo root) → context_dir (relative to repo root)
# Keyed by repo basename (or org/repo). Applied before Go/JS heuristics.
docker_contexts: {}

# Strings that look like image references (org/name:tag) but are YAML annotations,
# field role labels, or domain-specific identifiers — not container images.
known_non_image_prefixes:
  - "feast.io/"
  - "kubeflow.org/"
  - "k8s.io/"

params_env_filenames:
  notebooks:
    - params-latest.env

exceptions:

  # ---------------------------------------------------------------------------
  # Universal exceptions — apply to all repos
  # ---------------------------------------------------------------------------

  # Test directories
  - rules: "*"
    paths:
      - "**/test/**"
      - "**/tests/**"
      - "**/test_*/**"
      - "**/*_test/**"
      - "**/*_tests/**"
      - "**/*-test/**"
      - "**/*-tests/**"
      - "**/testdata/**"
      - "**/testing/**"
      - "**/*e2e*/**"
      - "**/mocks/**"
      - "**/hack/**"
      - "**/fixture/**"
      - "**/testutil/**"
      - "**/loadtest/**"
    reason: "Test/dev directory — not deployed in production"

  # Test file patterns
  - rules: "*"
    paths:
      - "*_test.go"
      - "*_mock.go"
      - "mock_*.go"
      - "*_fake.go"
      - "fake_*.go"
      - "test_*.py"
      - "*.test.ts"
      - "*.test.tsx"
      - "*.spec.ts"
      - "*.spec.tsx"
    reason: "Test/mock file"

  # CI directories
  - rules: "*"
    paths:
      - ".github/**"
      - ".tekton/**"
      - ".buildkite/**"
      - "**/ci/**"
    reason: "CI config — not deployed in production"

  # Non-production directories
  - rules: "*"
    paths:
      - "**/docs/**"
      - "**/examples/**"
      - "**/samples/**"
      - "**/demo/**"
      - "**/dev_tools/**"
    reason: "Non-production content — not deployed in production"

  # OLM scorecard config
  - rules: "*"
    paths:
      - "**/config/scorecard/**"
    reason: "OLM scorecard config — test images, not production"

  # Test kustomize overlays
  - rules: "*"
    paths:
      - "config/overlays/test/**"
      - "config/overlays/test-*/**"
      - "config/overlays/testing/**"
      - "config/overlays/kind-tests/**"
      - "config/overlays/odh-test/**"
    reason: "Test/sample configuration overlays — not deployed in production"

  # Build files
  - rules: "*"
    paths:
      - "**/Dockerfile"
      - "**/*.Dockerfile"
      - "**/Dockerfile.*"
      - "**/Containerfile"
      - "**/*.Containerfile"
      - "**/Containerfile.*"
    reason: "Build file — build-time only"

  # Lint config
  - rules: "*"
    paths:
      - "**/semgrep.yaml"
      - "**/semgrep.yml"
      - "**/.semgrep.yml"
    reason: "Linter config — not runtime"

  # ---------------------------------------------------------------------------
  # Repo-specific exceptions — scoped via 'repo' field
  #
  # Each repo from .github/config/repositories.yaml has a section below.
  # Add repo-specific path exclusions here rather than broadening the
  # universal rules above.
  # ---------------------------------------------------------------------------

  # --- odh-dashboard ---
  - rules: "*"
    repo: odh-dashboard
    paths:
      - "**/cypress/**"
      - "**/k8mocks/**"
      - "**/contract-tests/**"
      - "**/recordings/**"
      - "**/*.snap.json"
    reason: "Frontend test infrastructure — not deployed in production"

  - rules: "*"
    repo: odh-dashboard
    paths:
      - "distributions/*/developing/**"
    reason: "Local development tooling (Kind clusters, dev configs) — not deployed in production"

  - rules:
      - image-manifest-complete
      - no-image-tags
    repo: odh-dashboard
    paths:
      - "packages/*/api/openapi/**"
      - "packages/*/bff/openapi/**"
    reason: "OpenAPI specification files — image-like strings are example values documenting API response shapes, not runtime container references"

  - rules:
      - image-manifest-complete
      - no-image-tags
    repo: odh-dashboard
    paths:
      - "packages/*/upstream/**/openapi/**"
    reason: "Upstream OpenAPI/Swagger documentation — example values showing API response shapes, not runtime container references"

  - rules:
      - image-manifest-complete
      - no-image-tags
    repo: odh-dashboard
    paths:
      - "packages/*/bff/internal/api/middleware.go"
    images:
      - "quay.io/opendatahub/minio:*"
    reason: "Mock data inside getMockDSPipelineApplications() — only used when MockK8Client dev flag is enabled, never in production"
    reference: "https://issues.redhat.com/browse/RHOAIENG-69988"

  - rules:
      - image-manifest-complete
      - no-image-tags
    repo: odh-dashboard
    paths:
      - "packages/model-registry/upstream/bff/internal/repositories/model_transfer_jobs.go"
    images:
      - "ghcr.io/kubeflow/hub/job/async-upload:*"
      - "quay.io/quay/busybox:*"
    reason: "Upstream Kubeflow model-registry code — async-upload image is mitigated by existing operator configuration, busybox image is unreachable in the disconnected scenario it protects against"
    reference: "https://issues.redhat.com/browse/RHOAIENG-69988"

  - rules:
      - image-manifest-complete
      - no-image-tags
    repo: odh-dashboard
    paths:
      - "packages/notebooks/upstream/workspaces/frontend/manifests/kustomize/base/kustomization.yaml"
    reason: "Upstream base kustomize manifest — image is unused as bff manifests would replace this field"
    reference: "https://issues.redhat.com/browse/RHOAIENG-69988"

  - rules: no-runtime-egress
    repo: odh-dashboard
    paths:
      - "manifests/common/apps/jupyter/deploy-python-model-quickstart.yaml"
      - "manifests/rhoai/apps/pachyderm/pachyderm-app.yaml"
    reason: "curl commands live inside OdhQuickStart/OdhApplication documentation fields shown in the dashboard UI — instructional text, not egress executed by the manifest"
    # reference: "https://issues.redhat.com/browse/RHOAIENG-69988"

  # --- kubeflow ---
  - rules:
      - image-manifest-complete
      - no-image-tags
    repo: kubeflow
    paths:
      - "components/odh-notebook-controller/config/development/ktunnel.yaml"
    images:
      - "quay.io/omrikiei/ktunnel:*"
    reason: "Dev-only ktunnel webhook tunnel for local development — not deployed in production"
    reference: "https://issues.redhat.com/browse/RHOAIENG-69990"

  - rules: image-manifest-complete
    repo: kubeflow
    paths:
      - "components/notebook-controller/skaffold.yaml"
    images:
      - "gcr.io/kubeflow-ci/notebook-controller"
    reason: "Upstream Skaffold build config — build-time artifact target, not a runtime image"
    reference: "https://issues.redhat.com/browse/RHOAIENG-69990"

  # --- notebooks ---
  - rules: "*"
    repo: notebooks
    paths:
      - "scripts/**"
    reason: "Build-time utilities and CI scripts — not deployed in production"

  # --- kserve ---
  - rules: params-env-wiring
    repo: kserve
    message: "*ConfigMap/inferenceservice-config{key:_example}*"
    reason: "_example is a documentation-only field in inferenceservice-config — not functional configuration"

  # RHOAIENG-69993: Disconnected Readiness exceptions
  # Upstream default kustomize paths — ODH uses config/overlays/odh/
  - rules:
      - image-manifest-complete
      - no-image-tags
    repo: kserve
    paths:
      - "config/default/**"
      - "config/runtimes/**"
      - "config/localmodelnodes/**"
      - "config/localmodels/**"
      - "config/llmisvcconfig/**"
      - "config/llmisvc/**"
      - "config/overlays/version-template/**"
    reason: "Upstream KServe default kustomize — ODH/RHOAI uses config/overlays/odh/ which wires images through params.env and RELATED_IMAGE_* mechanism"

  # Sample/test Go code not in production binary
  - rules:
      - image-manifest-complete
      - no-image-tags
    repo: kserve
    paths:
      - "pkg/controller/v1alpha2/llmisvc/sample.go"
      - "pkg/controller/v1beta1/inferenceservice/tests_common.go"
    reason: "Sample/test Go code with hardcoded images — not compiled into production binary"

  # Orphan RELATED_IMAGE FAST vars — feature pending GA
  - rules: image-manifest-complete
    repo: kserve
    paths:
      - "kserve-module/pkg/kservemodule/images.go"
    message: "*RELATED_IMAGE*FAST*"
    reason: "Fast model update RELATED_IMAGE vars — operator wiring pending for this feature"
    expires: "2026-07-24"
    reference: "https://issues.redhat.com/browse/RHOAIENG-68059"

  # Test-only constant for OAuth proxy image
  - rules: image-manifest-complete
    repo: kserve
    paths:
      - "pkg/constants/constants_odh.go"
    message: "*odh-kube-auth-proxy*"
    reason: "Test-only constant — OauthProxyImage only used in *_test.go and tests_common.go files, not in production code. Comment at line 54 confirms 'Used for test purposes'"

  # LocalModelNode controller default storage-initializer image
  - rules:
      - no-image-tags
      - image-manifest-complete
    repo: kserve
    paths:
      - "pkg/controller/v1alpha1/localmodelnode/controller.go"
    message: "*storage-initializer*"
    reason: "Default fallback image — overridden at runtime via inferenceservice-config ConfigMap, params.env wires kserve-storage-initializer to RELATED_IMAGE_ODH_KSERVE_STORAGE_INITIALIZER_IMAGE which injects the digest-pinned image"

  # Modelcar init container ubi-micro — no-image-tags is secondary to image-manifest-complete fix
  - rules: no-image-tags
    repo: kserve
    paths:
      - "pkg/webhook/admission/pod/storage_initializer_injector.go"
    message: "*ubi-micro*"
    reason: "Modelcar init container default — tag is replaced by digest-pinned image via RELATED_IMAGE_* injection at runtime. The image-manifest-complete blocker for this line is tracked separately for a code fix in kserve"

  # --- kuberay ---
  - rules: "*"
    repo: kuberay
    paths:
      - "apiserver/**"
      - "ray-operator/config/default-with-webhooks/**"
    reason: "API server and upstream default-with-webhooks kustomize overlay — not used by OpenShift kustomize, not deployed in production"

  - rules: image-manifest-complete
    repo: kuberay
    paths:
      - "ray-operator/controllers/ray/authentication_controller.go"
    images:
      - "registry.redhat.io/openshift4/ose-kube-rbac-proxy-rhel9*"
    reason: "Default fallback image — overridden at runtime via init() function that reads RELATED_IMAGE_ODH_KUBE_RBAC_PROXY_IMAGE env var, wired through params.env → kustomize ConfigMap → Deployment env in the OpenShift overlay"
    reference: "https://issues.redhat.com/browse/RHOAIENG-69996"

  # --- trustyai-service-operator ---
  # (no repo-specific exceptions)

  # --- model-registry-operator ---
  - rules:
      - image-manifest-complete
      - no-image-tags
    repo: model-registry-operator
    paths:
      - "internal/controller/config/defaults.go"
    images:
      - "quay.io/opendatahub/model-registry:*"
      - "quay.io/openshift/origin-oauth-proxy:*"
      - "quay.io/openshift/origin-kube-rbac-proxy:*"
      - "quay.io/sclorg/postgresql-16-c10s:*"
      - "quay.io/opendatahub/odh-model-metadata-collection:*"
    reason: "Default fallback images — overridden at runtime by env vars wired through params.env → kustomize ConfigMap → Deployment env replacement. Tags replaced by @sha256: digests via Build-Config repos at release time."
    reference: "https://issues.redhat.com/browse/RHOAIENG-69989"

  # --- training-operator ---
  - rules:
      - no-image-tags
      - image-manifest-complete
    repo: training-operator
    paths:
      - "sdk/python/kubeflow/training/constants/constants.py"
      - "sdk/python/kubeflow/training/api/training_client.py"
    reason: "SDK client-side default images — users provide their own image; not used by the operator"

  - rules: python-imports-bundled
    repo: training-operator
    paths:
      - "sdk/python/kubeflow/training/utils/utils.py"
      - "sdk/python/kubeflow/training/api/training_client.py"
    reason: "utils.py generates a training pod script (user controls pip index URL); training_client.py is an error message string — neither is a runtime download"

  - rules: no-image-tags
    repo: training-operator
    paths:
      - "pkg/config/config.go"
    images:
      - "ghcr.io/kubeflow/training-v1/kubectl-delivery:*"
    reason: "MPI kubectl-delivery image default — MPI is not supported downstream"

  - rules: no-runtime-egress
    repo: training-operator
    paths:
      - "sdk/python/kubeflow/storage_initializer/**"
      - "sdk/python/kubeflow/trainer/hf_llm_training.py"
    reason: "Alpha SDK train() API — not supported downstream"

  # --- data-science-pipelines-operator ---
  # (no repo-specific exceptions)

  # --- odh-model-controller ---
  # (no repo-specific exceptions)

  # --- feast ---

  - rules:
      - image-manifest-complete
      - no-image-tags
    repo: feast
    paths:
      - "go/infra/docker/**"
    reason: "Local development infrastructure (Docker Compose for OTel/Jaeger/Prometheus) — not deployed in production"
    reference: "https://issues.redhat.com/browse/RHOAIENG-69995"
    expires: "2027-07-07"

  - rules:
      - no-runtime-egress
      - python-imports-bundled
    repo: feast
    paths:
      - "sdk/python/feast/templates/**"
    reason: "Template/starter code copied to user projects via 'feast init' — not part of Feast runtime, never deployed in production"
    reference: "https://issues.redhat.com/browse/RHOAIENG-69995"

  - rules: python-imports-bundled
    repo: feast
    paths:
      - "sdk/python/feast/image_utils.py"
      - "sdk/python/feast/torch_wrapper.py"
      - "sdk/python/feast/mlflow.py"
      - "sdk/python/feast/feature_store.py"
      - "sdk/python/feast/errors.py"
      - "sdk/python/feast/openlineage/client.py"
      - "sdk/python/feast/openlineage/mappers.py"
      - "sdk/python/feast/transformation/ray_transformation.py"
      - "sdk/python/feast/transformation/substrait_transformation.py"
      - "sdk/python/feast/dbt/parser.py"
      - "sdk/python/feast/api/registry/rest/rest_registry_server.py"
      - "sdk/python/feast/infra/mcp_servers/mcp_server.py"
      - "sdk/python/feast/infra/offline_stores/offline_store.py"
    reason: "String literals in ImportError/warning messages guiding users to install optional dependencies — no actual runtime pip subprocess invocations"
    reference: "https://issues.redhat.com/browse/RHOAIENG-69995"

  - rules: no-runtime-egress
    repo: feast
    paths:
      - "sdk/python/feast/embedder.py"
    reason: "Optional MultiModalEmbedder feature — user opt-in only, models can be pre-cached via HF_HOME/SENTENCE_TRANSFORMERS_HOME env vars for disconnected environments"
    reference: "https://issues.redhat.com/browse/RHOAIENG-69995"
    expires: "2027-07-07"

  - rules: no-runtime-egress
    repo: feast
    paths:
      - "sdk/python/feast/infra/ray_initializer.py"
    reason: "User-invoked from_huggingface() API — does not run automatically, disconnected users use alternative data sources or pre-cached datasets"
    reference: "https://issues.redhat.com/browse/RHOAIENG-69995"
    expires: "2027-07-07"

  - rules: no-runtime-egress
    repo: feast
    paths:
      - "sdk/python/feast/transformation/ray_transformation.py"
    reason: "SentenceTransformer reference is inside a docstring usage example, not runtime code"
    reference: "https://issues.redhat.com/browse/RHOAIENG-69995"
    expires: "2027-07-07"

  - rules: no-image-tags
    repo: feast
    paths:
      - "sdk/python/feast/infra/compute_engines/kubernetes/k8s_engine.py"
    images:
      - "feast/feast-k8s-materialization:*"
    reason: "Configurable default image in Pydantic config — overridden by operator image injection and user config in production"
    reference: "https://issues.redhat.com/browse/RHOAIENG-69995"
    expires: "2027-07-07"

  # --- ogx-k8s-operator ---
  # (no repo-specific exceptions)

  # --- ogx ---
  # (no repo-specific exceptions)

  # --- trainer ---
  - rules: "*"
    repo: trainer
    paths:
      - "manifests/base/runtimes/**"
    reason: "Upstream default runtimes — downstream provides its own runtime manifests"

  - rules: "no-image-tags"
    repo: trainer
    paths:
      - "api/python_api/**"
    reason: "Auto-generated Kubernetes API models with example image strings — not runtime references"

  - rules: no-runtime-egress
    repo: trainer
    paths:
      - "pkg/initializers/dataset/huggingface.py"
      - "pkg/initializers/model/huggingface.py"
    message: "*snapshot_download()*"
    reason: "User-triggered opt-in HuggingFace downloads via hf:// URI scheme. S3 alternative available for disconnected deployments."

  # --- models-as-a-service ---
  # Controller image param keys — overridden at runtime via RELATED_IMAGE_*
  # env vars injected by OLM. constants.go defines ImageParamKeys which maps
  # params.env keys to RELATED_IMAGE_* env vars; postrender.go ApplyParams
  # patches the corresponding Deployments/CronJobs at kustomize post-render.
  - rules:
      - image-manifest-complete
      - no-image-tags
    repo: models-as-a-service
    paths:
      - "maas-controller/pkg/platform/tenantreconcile/constants.go"
    reason: "ImageParamKeys maps param names to RELATED_IMAGE_* env vars — no actual image URIs to validate"

  - rules: image-manifest-complete
    repo: models-as-a-service
    paths:
      - "deployment/base/maas-api/core/kustomization.yaml"
      - "deployment/base/payload-processing/manager/kustomization.yaml"
      - "deployment/base/maas-api/core/cronjob-cleanup.yaml"
    reason: "Kustomize base manifests — images are injected by the controller at runtime via RELATED_IMAGE_* env vars"

  - rules: no-image-tags
    repo: models-as-a-service
    paths:
      - "deployment/base/maas-api/core/cronjob-cleanup.yaml"
    reason: "Base manifest tag — controller patches with digest from RELATED_IMAGE_UBI_MINIMAL_IMAGE at runtime"

  # --- mlflow-operator ---
  # (no repo-specific exceptions)

  # --- spark-operator ---
  # (no repo-specific exceptions)

  # --- workload-variant-autoscaler ---
  - rules: "*"
    repo: workload-variant-autoscaler
    paths:
      - "**/kind-emulator/**"
    reason: "Local Kind cluster emulator — not deployed in production"

  - rules: params-env-wiring
    repo: workload-variant-autoscaler
    paths:
      - "config/base"
      - "config/base/manager"
      - "config/overlays/cluster-scoped/kubernetes/**"
      - "config/overlays/cluster-scoped/openshift/**"
      - "config/overlays/namespace-scoped/kubernetes/**"
    reason: "Base manifests and non-namespace-scoped overlays — image placeholders are replaced by the namespace-scoped OpenShift overlay's params.env → configMapGenerator → replacements wiring"

  # --- opendatahub-operator ---
  - rules: "*"
    repo: opendatahub-operator
    paths:
      - "**/snapshots/**"
      - "**/internal/webhook/envtestutil/**"
    reason: "Test folders — not deployed in production"

  - rules: "*"
    repo: opendatahub-operator
    paths:
      - "config/**"
    images:
      - REPLACE_IMAGE:v0.0.0-placeholder
      - REPLACE_IMAGE:v0.0.0-rhoai-placeholder
    reason: "Test kustomize overlays — not deployed in production"

  # --- mcp-lifecycle-module-operator ---
  - rules: no-image-tags
    repo: mcp-lifecycle-module-operator
    paths:
      - "config/manager/manager.yaml"
    images:
      - "controller:*"
    reason: "Kubebuilder scaffold placeholder — production image set by opendatahub-operator ModuleConfig.ControllerImage (RELATED_IMAGE_ODH_MCP_LIFECYCLE_MODULE_OPERATOR_IMAGE) from ODH/RHOAI Build-Config digests"
    reference: "https://github.com/opendatahub-io/opendatahub-operator/blob/main/internal/controller/modules/mcplifecycleoperator/handler.go"

  - rules: no-image-tags
    repo: mcp-lifecycle-module-operator
    paths:
      - "internal/controller/resources/mcp-lifecycle-operator.yaml"
    images:
      - "mcp-lifecycle-operator:*"
    reason: "Checked-in operand Deployment placeholder — replaced at reconcile via OperandImage; production value from RELATED_IMAGE_ODH_MCP_LIFECYCLE_OPERATOR_IMAGE (ODH/RHOAI Build-Config digests)"
    reference: "https://github.com/opendatahub-io/opendatahub-operator/blob/main/internal/controller/modules/mcplifecycleoperator/handler.go"

  - rules: no-image-tags
    repo: mcp-lifecycle-module-operator
    paths:
      - "internal/controller/resources/mcp-lifecycle-operator.yaml"
    images:
      - "ghcr.io/modelcontextprotocol/servers/filesystem:*"
      - "ghcr.io/modelcontextprotocol/servers/github:*"
      - "custom-registry.io/my-mcp-server:*"
    reason: "CRD OpenAPI description examples in checked-in MCPLO operand manifests — documentation only, not deployed"
