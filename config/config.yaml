# yaml-language-server: $schema=../schemas/config.schema.json
#
# Central configuration for the disconnected readiness scanner.
# Applies to all scanned repos. Per-repo overrides go in
# .disconnected-readiness/config.yaml in the target repository.

registries:
  - registry.redhat.io
  - brew.registry.redhat.io
  - quay.io/opendatahub
  - quay.io/modh
  - registry.access.redhat.com
  - image-registry.openshift-image-registry.svc

known_mirrors:
  bundled_packages:
    - codeflare-sdk
    - odh-manifest
    - opendatahub-operator
  pypi_mirrors:
    - https://pypi.corp.redhat.com/simple/

exceptions:
  # Test directories
  - rule: "*"
    paths:
      - "test/**"
      - "tests/**"
      - "testdata/**"
      - "**/testdata/**"
      - "testing/**"
      - "e2e/**"
      - "mocks/**"
      - "contract-tests/**"
      - "hack/**"
    reason: "Test/dev directory — not deployed in production"

  # Test file patterns
  - rule: "*"
    paths:
      - "*_test.go"
      - "*_int_test.go"
      - "*_internal_test.go"
      - "*_mock.go"
      - "mock_*.go"
      - "*_fake.go"
      - "fake_*.go"
      - "test_*.py"
      - "*.test.ts"
      - "*.test.tsx"
      - "*.spec.ts"
      - "*.spec.tsx"
    reason: "Test/mock file"

  # Test fixtures and recordings
  - rule: "*"
    paths:
      - "**/recordings/**"
      - "**/snapshots/**"
      - "**/*.snap.json"
    reason: "Test fixtures and recordings — not deployed in production"

  # Test kustomize overlays
  - rule: "*"
    paths:
      - "config/overlays/test/**"
      - "config/overlays/test-*/**"
      - "config/overlays/testing/**"
      - "config/overlays/kind-tests/**"
      - "config/overlays/odh-test/**"
      - "config/samples/**"
    reason: "Test/sample configuration overlays — not deployed in production"

  # CI directories
  - rule: "*"
    paths:
      - ".github/**"
      - ".tekton/**"
      - ".buildkite/**"
      - "ci/**"
    reason: "CI config — not deployed in production"

  # Non-production directories
  - rule: "*"
    paths:
      - "docs/**"
      - "examples/**"
      - "samples/**"
      - "demo/**"
    reason: "Non-production content — not deployed in production"

  # Scorecard config
  - rule: "image-manifest-complete, no-image-tags"
    path: "config/scorecard/**"
    reason: "OLM scorecard config — test images, not production"

  # Build files
  - rule: "*"
    paths:
      - "**/Dockerfile"
      - "**/*.Dockerfile"
      - "**/Containerfile"
    reason: "Build file — build-time only"

  # Lint config
  - rule: "*"
    paths:
      - "**/semgrep.yaml"
      - "**/semgrep.yml"
      - "**/.semgrep.yml"
    reason: "Linter config — not runtime"
