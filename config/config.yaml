# yaml-language-server: $schema=../schemas/config.schema.json
#
# Central configuration for the disconnected readiness scanner.
# Applies to all scanned repos unless scoped by 'repo' field.

registries:
  - registry.redhat.io
  - brew.registry.redhat.io
  - quay.io/opendatahub
  - quay.io/modh
  - registry.access.redhat.com
  - image-registry.openshift-image-registry.svc

known_mirrors:
  bundled_packages:
    - codeflare-sdk
    - odh-manifest
    - opendatahub-operator
  pypi_mirrors:
    - https://pypi.corp.redhat.com/simple/

exceptions:

  # ---------------------------------------------------------------------------
  # Universal exceptions — apply to all repos
  # ---------------------------------------------------------------------------

  # Test directories
  - rule: "*"
    paths:
      - "**/test/**"
      - "**/*tests*/**"
      - "**/testdata/**"
      - "**/testing/**"
      - "**/*e2e*/**"
      - "**/mocks/**"
      - "**/hack/**"
    reason: "Test/dev directory — not deployed in production"

  # Test file patterns
  - rule: "*"
    paths:
      - "*_test.go"
      - "*_mock.go"
      - "mock_*.go"
      - "*_fake.go"
      - "fake_*.go"
      - "test_*.py"
      - "*.test.ts"
      - "*.test.tsx"
      - "*.spec.ts"
      - "*.spec.tsx"
    reason: "Test/mock file"

  # CI directories
  - rule: "*"
    paths:
      - ".github/**"
      - ".tekton/**"
      - ".buildkite/**"
      - "**/ci/**"
    reason: "CI config — not deployed in production"

  # Non-production directories
  - rule: "*"
    paths:
      - "**/docs/**"
      - "**/examples/**"
      - "**/samples/**"
      - "**/demo/**"
    reason: "Non-production content — not deployed in production"

  # OLM scorecard config
  - rule: "*"
    paths:
      - "**/config/scorecard/**"
    reason: "OLM scorecard config — test images, not production"

  # Test kustomize overlays
  - rule: "*"
    paths:
      - "config/overlays/test/**"
      - "config/overlays/test-*/**"
      - "config/overlays/testing/**"
      - "config/overlays/kind-tests/**"
      - "config/overlays/odh-test/**"
    reason: "Test/sample configuration overlays — not deployed in production"

  # Build files
  - rule: "*"
    paths:
      - "**/Dockerfile"
      - "**/*.Dockerfile"
      - "**/Containerfile"
    reason: "Build file — build-time only"

  # Lint config
  - rule: "*"
    paths:
      - "**/semgrep.yaml"
      - "**/semgrep.yml"
      - "**/.semgrep.yml"
    reason: "Linter config — not runtime"

  # ---------------------------------------------------------------------------
  # Repo-specific exceptions — scoped via 'repo' field
  #
  # Each repo from .github/config/repositories.yaml has a section below.
  # Add repo-specific path exclusions here rather than broadening the
  # universal rules above.
  # ---------------------------------------------------------------------------

  # --- odh-dashboard ---
  - rule: "*"
    repo: odh-dashboard
    paths:
      - "**/cypress/**"
      - "**/k8mocks/**"
      - "**/contract-tests/**"
      - "**/recordings/**"
      - "**/*.snap.json"
    reason: "Frontend test infrastructure — not deployed in production"

  # --- kubeflow ---
  # (no repo-specific exceptions)

  # --- notebooks ---
  # (no repo-specific exceptions)

  # --- kserve ---
  - rule: "*"
    repo: kserve
    paths:
      - "**/install/**"
    reason: "Upstream versioned install scripts — not used by operator-managed deployments"

  # --- kuberay ---
  # (no repo-specific exceptions)

  # --- trustyai-service-operator ---
  - rule: "image-manifest-complete"
    repo: trustyai-service-operator
    paths:
      - "controllers/lmes/constants.go"
      - "controllers/tas/constants.go"
      - "controllers/evalhub/constants.go"
    reason: >-
      Fallback defaults only — images are replaced at runtime via the operator
      ConfigMap (trustyai-service-operator-config), populated by odh-operator
      ApplyParams() with RELATED_IMAGE digest values from OLM CSV relatedImages
  - rule: "no-image-tags"
    repo: trustyai-service-operator
    paths:
      - "controllers/lmes/constants.go"
      - "controllers/tas/constants.go"
      - "controllers/evalhub/constants.go"
    reason: >-
      Fallback defaults only — images are replaced at runtime via the operator
      ConfigMap (trustyai-service-operator-config), populated by odh-operator
      ApplyParams() with RELATED_IMAGE digest values from OLM CSV relatedImages

  # --- model-registry-operator ---
  # (no repo-specific exceptions)

  # --- training-operator ---
  # (no repo-specific exceptions)

  # --- data-science-pipelines-operator ---
  # (no repo-specific exceptions)

  # --- odh-model-controller ---
  # (no repo-specific exceptions)

  # --- feast ---
  # (no repo-specific exceptions)

  # --- ogx-k8s-operator ---
  # (no repo-specific exceptions)

  # --- trainer ---
  # (no repo-specific exceptions)

  # --- models-as-a-service ---
  # (no repo-specific exceptions)

  # --- mlflow-operator ---
  # (no repo-specific exceptions)

  # --- spark-operator ---
  # (no repo-specific exceptions)

  # --- workload-variant-autoscaler ---
  - rule: "*"
    repo: workload-variant-autoscaler
    paths:
      - "**/kind-emulator/**"
    reason: "Local Kind cluster emulator — not deployed in production"

  # --- opendatahub-operator ---
  - rule: "*"
    repo: opendatahub-operator
    paths:
      - "**/snapshots/**"
    reason: "Test snapshots — not deployed in production"
